<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //for loop
        
        for(let i=1;i<=10;i++){
            document.write("hi"+"<br>");
        }

        //syntax
        // for(dataType variable = initial value ; variable end condition ; increment / decrement){
        //     ...
        //     block of Code
        //     ...
        // } 

        // var a = prompt("enter a number");
        // var b = prompt("enter a number");
        // var c = a + b;
        // document.write(c);    

        //increment loop
        for(let i = 1 ; i<=5;i++){
            document.write(i+"<br>"); 
        }

        for(let i=3;i<=18;i+=3){
            document.write(i+"<br>");
        }
        
        for(let i=5;i>=1;i--){
            document.write(i+"<br>");
        }
    </script>
</body>
</html>

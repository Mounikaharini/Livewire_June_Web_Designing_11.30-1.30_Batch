<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            font-family: calibri;
        }
        .box{
            height: 500px;
            width: 350px;
            overflow: hidden;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgb(191, 184, 184);
        }
        .box .box1{
            height: 200px;
            width: 350px;
            /* background: #930505; */
        }
        .box .box2{
            height: 300px;
            width: 350px;
            /* background-color: #fcb3b3; */
        
        }
        .box .box2 h1{
            text-align: center;
            letter-spacing: 2px;
            color: rgb(58, 55, 55);
            /* text-shadow: 2px 2px 2px rgb(136, 134, 134); */
        }
        .box .box2 form label{
            margin-left: 50px;
            margin-bottom: 20px;
            padding-top: 20px;
        }
        .box .box2 form input{
            margin-left: 50px;
            margin-bottom: 20px;
            border-radius: 20px;
            border: none;
            background-color:#6fa79b;
            height: 30px;
            width: 230px;
        }
        .box .box2 form input:hover{
            background-color: #fff ;
            border: 2px solid #6fa79b;
            border-radius: 5px;
        }
        .box .box2 form input::placeholder{
            color: rgb(9, 9, 9);
            text-align: center;
            font-size: 16px;
        }
        .box .box2 button{
            width: 100px;
            margin-left: 120px;
            height: 32px;
            border-radius: 20px;
            border: none;
            background-color:#5a5b5b;
            color: white;
            font-size: 16px;
        }
        .box .box2 button:hover{
            background-color: #000000;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="box1">
            <img src="image/bg1.avif" alt="" width="350" height="200">
        </div>
        <div class="box2">
            <h1>Login</h1>
            <form>
                <label>Username</label><br>
                <input type="text" placeholder="Enter Your Name"><br>
                <label>Password</label><br>
                <input type="password" placeholder="Enter Your Password"><br>
            </form>
            <button>Submit</button>
        </div>
    </div>
    
</body>
</html>

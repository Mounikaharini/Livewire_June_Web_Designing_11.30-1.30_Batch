<!DOCTYPE html>
<html>

<head>
    <style>
        .p {
            display: inline-block;
        }

        a {
            color: black;
            float: left;
            padding: 8px 16px;
            text-decoration: none;
            transition: background-color .3s;
            border: 1px solid #ddd;
        }

        a.active {
            background-color: #4CAF50;
            color: white;
            border: 1px solid #4CAF50;
        }

        a:hover:not(.active) {
            background-color: lightgray;
        }
    </style>
</head>

<body>
    <div class="p">
        <a href="#">&laquo;</a>
        <a href="#">1</a>
        <a href="#">2</a>
        <a href="#">3</a>
        <a href="#">4</a>
        <a href="#">5</a>
        <a href="#" class="active">6</a>
        <a href="#">&raquo;</a>
    </div>
</body>

</html>

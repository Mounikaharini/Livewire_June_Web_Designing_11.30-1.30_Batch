<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //operators
         
        //arithmetic operator
        // + , - , * , / , %

        var a= 6;
        var b = 5;
        document.write(a+b+"<br>");
        document.write(a-b+"<br>");
        document.write(a*b+"<br>");
        document.write(a/b+"<br>");
        document.write(a%b+"<br>");


        // assignment operator 
        // += , -= , *= , /= , %= 

        var c = 10;
        
        c += 4;
        document.write(c +"<br>");

        c -=4;
        document.write(c +"<br>");

        c *=4;
        document.write(c +"<br>");

        c /=4;
        document.write(c +"<br>");

        c %= 2;
        document.write(c +"<br><br>");
        
        // Comparison operator
        // == , != , >= , <= , > , <

        var d =5;
        var e = 7;

        document.write((d == e) +"<br>");
        document.write((d != e) +"<br>");
        document.write((d >= e) +"<br>");
        document.write((d <= e) +"<br>");
        document.write((d > e) +"<br>");
        document.write((d < e) +"<br><br>");

        // Logical Operator
        // && , || , !

        var a = 5 ;
        var b = 10 ;
        var c = 12 ;

        document.write((a == b && a == c) +"<br>");
        document.write((a == b || a == c) +"<br>");
        document.write(!(a == b) +"<br><br>");
            
        // Ternary Operator
        // 

        var a = "System";
        var output= (a == "Laptop")?"Use Laptop":"Use System";
        document.write(output);

    </script>
</body>
</html>

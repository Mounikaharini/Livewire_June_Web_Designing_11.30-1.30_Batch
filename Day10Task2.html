<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .circle{
            width: 100px;
            height: 150px;
            background: #000;
            border-radius: 50%;
        }
        .circle:hover{
            width: 150px;
            height: 200px;
            /* transition: 2s; */
            /* transition-delay: 1s; */
            transition-duration: 2s;
        }
    </style>
</head>
<body>
    <div class="circle"></div>
</body>
</html>

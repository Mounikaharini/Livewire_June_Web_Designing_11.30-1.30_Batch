<html lang="en">
<head>

        <input type="radio" value="1" name="0">Female <br>

        <label>Course :</label><br>

        <input type="checkbox">SQL <br>
        <input type="checkbox">Django <br>
        <input type="checkbox">Springboot <br>

        <input type="checkbox">UI/UX <br>

        <label>Upload Resume :</label><br>

        <input type="number" max="80" min="0"><br>

        <label>Color :</label>
        <input type="color">

        <label>Skills :</label>
        <input type="range">

        <input type="time">

            <option value="option2"> option 2</option>
        </select>

            <option> option 2</option>
            <option>option 1</option>
            <option> option 2</option>
        </select>

        <button type="reset">Reset</button>
